<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Frontend Mentor | Base Apparel coming soon page</title>
  </head>
  <body>
    <main>
      <img class="logo" src="assets/images/logo.svg" alt="Brand Logo" />
      <div class="content">
        <h1 class="title"><span>We're</span><br />coming<br />soon</h1>
        <p class="text">Hello fellow shoppers! We're currently building our new fashion store. Add your email below to stay up-to-date with announcements and our launch deals.</p>
        <div class="form">
          <input class="input-field" type="email" name="" id="" placeholder="Email Address" />
          <button class="submitt-button" type="submit">
            <img src="assets/images/icon-arrow.svg" alt="" />
          </button>
        </div>
      </div>
      <img class="hero__img" src="assets/images/hero-mobile.jpg" alt="" />
    </main>
  </body>
</html>
